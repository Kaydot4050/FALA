[functions]
  directory = "../../artifacts/api-server/netlify/functions"
  node_bundler = "esbuild"

[build]
  command = "pnpm build"
  publish = "dist/public"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
