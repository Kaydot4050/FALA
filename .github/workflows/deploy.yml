name: Deploy to Namecheap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # 1. Build the Backend API Server
      - name: Build API Server
        run: pnpm --filter @workspace/api-server run build

      # 2. Clean package.json for Namecheap
      - name: Clean package.json for Namecheap
        run: |
          node -e "
            const fs = require('fs');
            const path = './artifacts/api-server/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            console.log('--- STARTING CLEAN ---');
            if (pkg.dependencies) {
              for (const key in pkg.dependencies) {
                const val = pkg.dependencies[key];
                if (val.includes('workspace:') || val.includes('catalog:')) {
                  console.log('REMOVING:', key);
                  delete pkg.dependencies[key];
                }
              }
            }
            if (pkg.devDependencies) delete pkg.devDependencies;
            console.log('CLEANED CONTENT:', JSON.stringify(pkg, null, 2));
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2));
            console.log('--- CLEAN COMPLETE ---');
          "

      # 3. Build the Customer Dashboard
      - name: Build Customer Dashboard
        env:
          VITE_API_URL: https://api.falaadeals.shop
        run: pnpm --filter @workspace/datamart-dashboard run build

      # 4. Build the Admin Dashboard
      - name: Build Admin Dashboard
        env:
          VITE_API_URL: https://api.falaadeals.shop
        run: pnpm --filter @workspace/admin-dashboard run build

      # 5. Deploy Customer Dashboard to public_html
      - name: Deploy Customer Dashboard via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./artifacts/datamart-dashboard/dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**

      # 6. Deploy Admin Dashboard to admin subdomain root
      - name: Deploy Admin Dashboard via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./artifacts/admin-dashboard/dist/
          server-dir: /admin.falaadeals.shop/
          exclude: |
            **/.git*
            **/.git*/**

      # 7. Trigger Node.js App Restart
      - name: Trigger Node.js App Restart
        run: |
          mkdir -p artifacts/api-server/tmp
          date > artifacts/api-server/tmp/restart.txt

      # 8. Deploy Backend to api-server folder
      - name: Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./artifacts/api-server/
          server-dir: ./api-server/
          exclude: |
            **/.git*
            **/.git*/**
            node_modules/**
            .env
            scratch/**
