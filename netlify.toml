# Build settings should be configured in the Netlify UI (Base Directory) for monorepo support

[functions]
  directory = "artifacts/api-server/netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
