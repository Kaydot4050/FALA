[build]
  command = "pnpm install && pnpm --filter @workspace/admin-dashboard build"
  publish = "artifacts/admin-dashboard/dist/public"

[functions]
  directory = "artifacts/api-server/netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
