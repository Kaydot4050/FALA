[build]
  command = "PORT=3000 BASE_PATH=/ pnpm -r --if-present run build"
  publish = "artifacts/datamart-dashboard/dist"
  
[build.environment]
  PNPM_FLAGS = "--no-frozen-lockfile"
  NODE_VERSION = "22"
  # IMPORTANT: Set these variables in the Netlify UI (Environment Variables)
  # DATAMART_API_KEY
  # DATABASE_URL
  # PAYSTACK_SECRET_KEY
  # PAYSTACK_PUBLIC_KEY
  # DATAMART_WEBHOOK_SECRET

[functions]
  directory = "artifacts/api-server/netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/paystack/*"
  to = "/.netlify/functions/api/paystack/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/datamart-webhook/*"
  to = "/.netlify/functions/api/datamart-webhook/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
