[build]
  command = "PORT=3000 BASE_PATH=/ pnpm -r --if-present run build"
  publish = "artifacts/datamart-dashboard/dist/public"

[functions]
  directory = "artifacts/api-server/netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
