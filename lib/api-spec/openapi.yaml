openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: DataMart GH reseller API proxy
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: packages
    description: Data package operations
  - name: purchase
    description: Purchase operations
  - name: orders
    description: Order status operations
  - name: delivery
    description: Delivery tracking
  - name: account
    description: Account operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /packages:
    get:
      operationId: getDataPackages
      tags: [packages]
      summary: Get available data packages
      description: Returns available data packages, optionally filtered by network
      parameters:
        - name: network
          in: query
          required: false
          schema:
            type: string
            enum: [YELLO, TELECEL, AT_PREMIUM]
      responses:
        "200":
          description: Data packages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataPackagesResponse"
        "500":
          description: Error fetching packages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /purchase:
    post:
      operationId: purchaseData
      tags: [purchase]
      summary: Purchase a data bundle
      description: Purchase a data bundle for a phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseRequest"
      responses:
        "200":
          description: Purchase successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseResponse"
        "400":
          description: Purchase failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /order/{reference}:
    get:
      operationId: getOrderStatus
      tags: [orders]
      summary: Get order status
      description: Get the status of a specific order by reference
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatusResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /delivery-tracker:
    get:
      operationId: getDeliveryTracker
      tags: [delivery]
      summary: Get live delivery tracker data
      description: Returns real-time delivery status and scanner information
      responses:
        "200":
          description: Delivery tracker data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryTrackerResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /balance:
    get:
      operationId: getBalance
      tags: [account]
      summary: Get wallet balance
      description: Returns the current wallet balance and account info
      responses:
        "200":
          description: Balance info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions:
    get:
      operationId: getTransactions
      tags: [account]
      summary: Get transaction history
      description: Returns paginated transaction history
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Transactions list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionsResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    DataPackage:
      type: object
      properties:
        capacity:
          type: number
        mb:
          type: number
        network:
          type: string
        price:
          type: number
      required:
        - capacity
        - mb
        - network
        - price

    DataPackagesResponse:
      type: object
      properties:
        status:
          type: string
        pricingTier:
          type: string
        data:
          type: object
          properties:
            YELLO:
              type: array
              items:
                $ref: "#/components/schemas/DataPackage"
            TELECEL:
              type: array
              items:
                $ref: "#/components/schemas/DataPackage"
            AT_PREMIUM:
              type: array
              items:
                $ref: "#/components/schemas/DataPackage"
      required:
        - status
        - data

    PurchaseRequest:
      type: object
      properties:
        phoneNumber:
          type: string
        network:
          type: string
          enum: [YELLO, TELECEL, AT_PREMIUM]
        capacity:
          type: string
        gateway:
          type: string
          default: wallet
      required:
        - phoneNumber
        - network
        - capacity

    PurchaseData:
      type: object
      properties:
        purchaseId:
          type: string
        orderReference:
          type: string
        transactionReference:
          type: string
        network:
          type: string
        capacity:
          type: number
        price:
          type: number
        balanceBefore:
          type: number
        balanceAfter:
          type: number
        orderStatus:
          type: string
        processingMethod:
          type: string
      required:
        - purchaseId
        - orderReference
        - network
        - capacity
        - price
        - orderStatus

    PurchaseResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        data:
          $ref: "#/components/schemas/PurchaseData"
      required:
        - status
        - message

    PurchaseErrorResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        currentBalance:
          type: ["number", "null"]
        requiredAmount:
          type: ["number", "null"]
      required:
        - status
        - message

    OrderData:
      type: object
      properties:
        orderId:
          type: string
        reference:
          type: string
        phoneNumber:
          type: string
        network:
          type: string
        capacity:
          type: number
        price:
          type: number
        orderStatus:
          type: string
        processingMethod:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - orderId
        - reference
        - phoneNumber
        - network
        - capacity
        - price
        - orderStatus

    OrderStatusResponse:
      type: object
      properties:
        status:
          type: string
        data:
          $ref: "#/components/schemas/OrderData"
      required:
        - status

    DeliveryStats:
      type: object
      properties:
        checked:
          type: number
        delivered:
          type: number
        partial:
          type: number
        pending:
          type: number
        failed:
          type: number
      required:
        - checked
        - delivered
        - pending

    DeliveryOrderItem:
      type: object
      properties:
        phone:
          type: string
        network:
          type: string
        capacity:
          type: number
        deliveryStatus:
          type: string
      required:
        - phone
        - network
        - capacity
        - deliveryStatus

    DeliveryTrackerData:
      type: object
      properties:
        message:
          type: string
        scanner:
          type: object
          properties:
            active:
              type: boolean
            waiting:
              type: boolean
            waitSeconds:
              type: number
          required:
            - active
            - waiting
        stats:
          $ref: "#/components/schemas/DeliveryStats"
        lastDelivered:
          type: object
          properties:
            trackingId:
              type: string
            summary:
              type: string
          required:
            - summary
        checkingNow:
          type: object
          properties:
            summary:
              type: string
          required:
            - summary
        yourOrders:
          type: object
          properties:
            inCurrentBatch:
              type: array
              items:
                $ref: "#/components/schemas/DeliveryOrderItem"
            inLastDeliveredBatch:
              type: array
              items:
                $ref: "#/components/schemas/DeliveryOrderItem"
      required:
        - message
        - stats

    DeliveryTrackerResponse:
      type: object
      properties:
        status:
          type: string
        data:
          $ref: "#/components/schemas/DeliveryTrackerData"
      required:
        - status

    BalanceData:
      type: object
      properties:
        balance:
          type: number
        currency:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
          required:
            - id
            - name
            - email
        timestamp:
          type: string
      required:
        - balance
        - currency

    BalanceResponse:
      type: object
      properties:
        status:
          type: string
        data:
          $ref: "#/components/schemas/BalanceData"
      required:
        - status

    Transaction:
      type: object
      properties:
        type:
          type: string
        amount:
          type: number
        status:
          type: string
        reference:
          type: string
        gateway:
          type: string
        createdAt:
          type: string
      required:
        - type
        - amount
        - status
        - reference

    TransactionsPagination:
      type: object
      properties:
        currentPage:
          type: number
        totalPages:
          type: number
        totalItems:
          type: number
      required:
        - currentPage
        - totalPages
        - totalItems

    TransactionsData:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        pagination:
          $ref: "#/components/schemas/TransactionsPagination"
      required:
        - transactions
        - pagination

    TransactionsResponse:
      type: object
      properties:
        status:
          type: string
        data:
          $ref: "#/components/schemas/TransactionsData"
      required:
        - status
